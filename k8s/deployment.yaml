---
# =============================================
# NAMESPACE
# =============================================
apiVersion: v1
kind: Namespace
metadata:
  name: buzztips

---
# =============================================
# SECRET (API Keys - set via kubectl or Azure Key Vault)
# =============================================
apiVersion: v1
kind: Secret
metadata:
  name: buzztips-secrets
  namespace: buzztips
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "your-anthropic-api-key"
  GOOGLE_PLACES_API_KEY: "your-google-places-api-key"

---
# =============================================
# FRONTEND DEPLOYMENT
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buzztips-frontend
  namespace: buzztips
  labels:
    app: buzztips-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: buzztips-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: buzztips-frontend
    spec:
      containers:
        - name: frontend
          image: buzztipsacr.azurecr.io/buzztips-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

---
# =============================================
# BACKEND DEPLOYMENT
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buzztips-api
  namespace: buzztips
  labels:
    app: buzztips-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: buzztips-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: buzztips-api
    spec:
      containers:
        - name: api
          image: buzztipsacr.azurecr.io/buzztips-api:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: buzztips-secrets
                  key: ANTHROPIC_API_KEY
            - name: GOOGLE_PLACES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: buzztips-secrets
                  key: GOOGLE_PLACES_API_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20

---
# =============================================
# SERVICES
# =============================================
apiVersion: v1
kind: Service
metadata:
  name: buzztips-frontend
  namespace: buzztips
spec:
  selector:
    app: buzztips-frontend
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: buzztips-api
  namespace: buzztips
spec:
  selector:
    app: buzztips-api
  ports:
    - port: 5000
      targetPort: 5000

---
# =============================================
# INGRESS (routes buzztips.com to frontend + /api to backend)
# =============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buzztips-ingress
  namespace: buzztips
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - buzztips.com
        - www.buzztips.com
      secretName: buzztips-tls
  rules:
    - host: buzztips.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: buzztips-api
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: buzztips-frontend
                port:
                  number: 80
    - host: www.buzztips.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: buzztips-frontend
                port:
                  number: 80

---
# =============================================
# HORIZONTAL POD AUTOSCALER
# =============================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: buzztips-api-hpa
  namespace: buzztips
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: buzztips-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
